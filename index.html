<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Reservas</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="nome-sistema">
            <h1>Hotel Aura Palace</h1>
        </div>
        <div class="informacao-auxiliar">
            <div class="foto-perfil">
                <img src="assets/img/foto-perfil.jpeg" alt="Foto de perfil" class="imagem-perfil">
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <section class="introducao">
                <div>
                    <p>Olá, Bem-vindo</p>
                    <h2>Painel de Reservas</h2>
                </div>
            </section>
            <section class="resumo-dashboard">
                <div class="card-resumo">
                    <div class="reservas-totais">
                        <i class="fa-solid fa-calendar"></i>
                        <p class="numero numero-hoje"></p>
                        <p class="titulo">Reservas Hoje</p>
                    </div>
                    <div class="reservas-pendentes">
                        <i class="fa-solid fa-clock"></i>
                        <p class="numero numero-pendentes"></p>
                        <p class="titulo">Reservas Pendentes</p>
                    </div>
                    <div class="reservas-canceladas">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <p class="numero numero-canceladas"></p>
                        <p class="titulo">Reservas Canceladas</p>
                    </div>
                     <div class="reservas-confirmadas">
                        <i class="fa-regular fa-circle-check"></i>
                        <p class="numero numero-confirmadas"></p>
                        <p class="titulo">Reservas Confirmadas</p>
                    </div>
                </div>
            </section>
            <section class="busca-filtros">
                    <form action="#" method="get">
                        <div class="barra-busca">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="Buscar reserva..." id="buscar-reserva">
                        </div>
                        <button type="submit" class="btn-nova-reserva">Nova Reserva</button>
                </form>
            </section>
            <section class="lista-reservas">
                <div class="reservas-container">
                </div>
            </section>
        </div>
    </main>
    <footer>
        <p>© 2026 Daniel Alves • Front-end Developer</p>
    </footer>
    <script src="https://kit.fontawesome.com/82373a1d85.js" crossorigin="anonymous"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
